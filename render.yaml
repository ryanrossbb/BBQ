services:
  - type: web
    name: quote-spreadsheeter
    runtime: python
    plan: starter           # $7/mo — keeps the service warm; use 'free' for testing
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 900 --workers 2 --bind 0.0.0.0:$PORT
    healthCheckPath: /healthz
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false         # set this manually in Render dashboard
      - key: SHARED_SECRET
        sync: false         # optional; set to enable simple auth
      - key: CLAUDE_MODEL
        value: claude-opus-4-7
      - key: PYTHON_VERSION
        value: "3.12"
